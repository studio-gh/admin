<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio GH — Acervo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;900&family=Playfair+Display:ital,wght@0,500;1,500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FDFAF5;
    --charcoal:#2a2a2a;
    --gold:#E8A020;
    --charcoal-soft:#4a4a4a;
    --line:rgba(42,42,42,0.12);
    --card-bg:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--charcoal);
    font-family:'DM Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}

  /* HEADER */
  header{
    padding:28px 20px 22px;
    border-bottom:1px solid var(--line);
    background:var(--cream);
    position:sticky;
    top:0;
    z-index:20;
  }
  .header-inner{
    max-width:1200px;
    margin:0 auto;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px 20px;
  }
  .wordmark{
    font-family:'Fraunces',serif;
    font-weight:900;
    font-size:26px;
    letter-spacing:-0.01em;
    color:var(--charcoal);
    display:flex;
    align-items:baseline;
    gap:2px;
  }
  .wordmark .o-dot{
    color:var(--gold);
  }
  .tagline{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:14px;
    color:var(--charcoal-soft);
  }

  /* STATS BAR */
  .stats{
    max-width:1200px;
    margin:16px auto 0;
    padding:0 20px;
    display:flex;
    gap:28px;
    flex-wrap:wrap;
    font-size:13px;
    color:var(--charcoal-soft);
  }
  .stats b{
    color:var(--charcoal);
    font-weight:700;
  }

  /* CONTROLS */
  .controls{
    max-width:1200px;
    margin:18px auto 0;
    padding:0 20px 18px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .controls input[type="text"]{
    flex:1 1 220px;
    padding:11px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fff;
    font-family:'DM Sans',sans-serif;
    font-size:14px;
    color:var(--charcoal);
    outline:none;
  }
  .controls input[type="text"]:focus{
    border-color:var(--gold);
  }
  .controls select{
    padding:11px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fff;
    font-family:'DM Sans',sans-serif;
    font-size:14px;
    color:var(--charcoal);
    outline:none;
    min-width:150px;
  }
  .controls select:focus{border-color:var(--gold);}

  /* GRID */
  main{
    max-width:1200px;
    margin:0 auto;
    padding:6px 20px 60px;
  }
  #resultCount{
    font-size:13px;
    color:var(--charcoal-soft);
    margin-bottom:14px;
  }
  #resultCount b{color:var(--charcoal);}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:14px;
  }
  .card{
    background:var(--card-bg);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .card:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 18px rgba(42,42,42,0.10);
    border-color:var(--gold);
  }
  .thumb-wrap{
    width:100%;
    aspect-ratio:1/1;
    background:
      repeating-linear-gradient(45deg,#f2ede3 0,#f2ede3 6px,#ece5d6 6px,#ece5d6 12px);
    position:relative;
    overflow:hidden;
  }
  .thumb-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .card-body{
    padding:9px 10px 11px;
  }
  .card-title{
    font-size:12.5px;
    font-weight:500;
    color:var(--charcoal);
    line-height:1.3;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    margin-bottom:4px;
  }
  .card-meta{
    font-size:11px;
    color:var(--charcoal-soft);
    display:flex;
    justify-content:space-between;
    gap:6px;
  }
  .card-tag{
    display:inline-block;
    background:var(--gold);
    color:var(--charcoal);
    font-size:10px;
    font-weight:700;
    padding:1px 6px;
    border-radius:20px;
    max-width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  /* LOAD MORE */
  .load-more-wrap{
    text-align:center;
    margin-top:26px;
  }
  #loadMoreBtn{
    padding:12px 26px;
    border:1px solid var(--charcoal);
    background:transparent;
    color:var(--charcoal);
    font-family:'DM Sans',sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:.02em;
    border-radius:30px;
    cursor:pointer;
  }
  #loadMoreBtn:hover{
    background:var(--charcoal);
    color:var(--cream);
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--charcoal-soft);
    font-size:14px;
  }

  footer{
    text-align:center;
    padding:26px 20px 40px;
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:13px;
    color:var(--charcoal-soft);
  }

  @media (max-width:600px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
    .wordmark{font-size:22px;}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="wordmark">studi<span class="o-dot">o</span>gh</div>
      <div class="tagline">Arte feita com (c)alma</div>
    </div>
  </div>
  <div class="stats" id="statsBar"></div>
</header>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Buscar por nome do arquivo..." autocomplete="off">
  <select id="collectionFilter"></select>
  <select id="sortSelect">
    <option value="name-asc">Nome (A-Z)</option>
    <option value="name-desc">Nome (Z-A)</option>
    <option value="size-desc">Tamanho (maior)</option>
    <option value="size-asc">Tamanho (menor)</option>
    <option value="date-desc" selected>Modificado (recente)</option>
    <option value="date-asc">Modificado (antigo)</option>
  </select>
</div>

<main>
  <div id="resultCount"></div>
  <div class="grid" id="grid"></div>
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
    <button id="loadMoreBtn">Carregar mais</button>
  </div>
  <div class="empty-state" id="emptyState" style="display:none;">Nenhuma obra encontrada.</div>
</main>

<footer>Arte feita com (c)alma. ✦</footer>

// ---- STATE ----
let filtered = CATALOG.slice();
let renderedCount = 0;
const PAGE_SIZE = 96;

const gridEl = document.getElementById('grid');
const searchEl = document.getElementById('searchInput');
const collectionEl = document.getElementById('collectionFilter');
const sortEl = document.getElementById('sortSelect');
const resultCountEl = document.getElementById('resultCount');
const loadMoreWrap = document.getElementById('loadMoreWrap');
const loadMoreBtn = document.getElementById('loadMoreBtn');
const emptyStateEl = document.getElementById('emptyState');
const statsBar = document.getElementById('statsBar');

function parseDate(str){
  // formato M/D/YYYY
  const parts = str.split('/');
  if(parts.length !== 3) return 0;
  return new Date(parts[2], parts[0]-1, parts[1]).getTime();
}

function buildStats(){
  const totalObras = CATALOG.length;
  const colecoes = new Set(CATALOG.map(r => r[1]));
  const totalKB = CATALOG.reduce((sum, r) => sum + (r[3]||0), 0);
  const totalMB = (totalKB/1024).toFixed(0);
  statsBar.innerHTML =
    '<span><b>' + totalObras + '</b> obras</span>' +
    '<span><b>' + colecoes.size + '</b> coleções</span>' +
    '<span><b>' + totalMB + ' MB</b> de acervo</span>';
}

function buildCollectionFilter(){
  const counts = {};
  CATALOG.forEach(r => { counts[r[1]] = (counts[r[1]]||0) + 1; });
  const cols = Object.keys(counts).sort((a,b) => a.localeCompare(b, 'pt-BR'));
  let html = '<option value="">Todas as coleções</option>';
  cols.forEach(c => {
    html += '<option value="' + c.replace(/"/g,'&quot;') + '">' + c + ' (' + counts[c] + ')</option>';
  });
  collectionEl.innerHTML = html;
}

function applyFilters(){
  const q = searchEl.value.trim().toLowerCase();
  const col = collectionEl.value;
  filtered = CATALOG.filter(r => {
    if(col && r[1] !== col) return false;
    if(q && !r[0].toLowerCase().includes(q)) return false;
    return true;
  });
  applySort();
  renderedCount = 0;
  gridEl.innerHTML = '';
  renderNextPage();
  updateResultCount();
}

function applySort(){
  const mode = sortEl.value;
  filtered.sort((a,b) => {
    switch(mode){
      case 'name-asc': return a[0].localeCompare(b[0], 'pt-BR');
      case 'name-desc': return b[0].localeCompare(a[0], 'pt-BR');
      case 'size-desc': return (b[3]||0) - (a[3]||0);
      case 'size-asc': return (a[3]||0) - (b[3]||0);
      case 'date-desc': return parseDate(b[4]) - parseDate(a[4]);
      case 'date-asc': return parseDate(a[4]) - parseDate(b[4]);
      default: return 0;
    }
  });
}

function updateResultCount(){
  resultCountEl.innerHTML = '<b>' + filtered.length + '</b> obra' + (filtered.length===1?'':'s') + ' encontrada' + (filtered.length===1?'':'s');
  emptyStateEl.style.display = filtered.length === 0 ? 'block' : 'none';
}

function cardHTML(item){
  const [titulo, colecao, id, kb] = item;
  const thumb = 'https://drive.google.com/thumbnail?id=' + id + '&sz=w400';
  const link = 'https://drive.google.com/file/d/' + id + '/view';
  const sizeLabel = kb > 1024 ? (kb/1024).toFixed(1) + ' MB' : kb + ' KB';
  return (
    '<a class="card" href="' + link + '" target="_blank" rel="noopener">' +
      '<div class="thumb-wrap"><img loading="lazy" src="' + thumb + '" alt="" onerror="this.style.display=\'none\'"></div>' +
      '<div class="card-body">' +
        '<div class="card-title">' + escapeHtml(titulo) + '</div>' +
        '<div class="card-meta">' +
          '<span class="card-tag">' + escapeHtml(colecao) + '</span>' +
          '<span>' + sizeLabel + '</span>' +
        '</div>' +
      '</div>' +
    '</a>'
  );
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderNextPage(){
  const slice = filtered.slice(renderedCount, renderedCount + PAGE_SIZE);
  const html = slice.map(cardHTML).join('');
  gridEl.insertAdjacentHTML('beforeend', html);
  renderedCount += slice.length;
  loadMoreWrap.style.display = renderedCount < filtered.length ? 'block' : 'none';
}

loadMoreBtn.addEventListener('click', renderNextPage);
searchEl.addEventListener('input', applyFilters);
collectionEl.addEventListener('change', applyFilters);
sortEl.addEventListener('change', applyFilters);

buildStats();
buildCollectionFilter();
applyFilters();
</script>
